name: Daily Live Picks

on:
  schedule:
    - cron: '20 20 * * *'
  workflow_dispatch:

jobs:
  run-live-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run live TAB pipeline
        run: python run_live_pipeline.py --source tab
